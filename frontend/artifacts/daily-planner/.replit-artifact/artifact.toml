kind = "web"
previewPath = "/"
title = "Daily Planner"
version = "1.0.0"
id = "artifacts/daily-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21760

[services.development]
run = "pnpm --filter @workspace/daily-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daily-planner", "run", "build" ]
publicDir = "artifacts/daily-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21760"
BASE_PATH = "/"
